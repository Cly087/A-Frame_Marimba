<!DOCTYPE html>
<html lang="">

<head>
	<meta charset="utf-8">
	<title>Play the Marimba</title>
	<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

	<!-- Scripts -->
	<script
		src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
</head>

<body>
	<a-assets>
		<!-- Reused properties -->
		<a-mixin id="key" width="0.3" rotation="-45 0 0" sound="volume: 5; on: click; poolSize: 5"
			animation__hover="property: color; to: #FFFFFF; startEvents: mouseenter; dur: 200"
			animation__leave="startEvents: mouseleave; dur: 200"
			animation__click="property: position; startEvents: click; dur: 150"></a-mixin>
		<a-mixin id="depth" depth="0.1"></a-mixin>

		<a-mixin id="text-note" position="0 0 0.06" text="color: black; align: center; width: 4"></a-mixin>

		<!-- Audio files -->
		<audio id="C3" src="sounds/C3.wav" preload="auto"></audio>
		<audio id="D3" src="sounds/D3.wav" preload="auto"></audio>
		<audio id="E3" src="sounds/E3.wav" preload="auto"></audio>
		<audio id="F3" src="sounds/F3.wav" preload="auto"></audio>
		<audio id="G3" src="sounds/G3.wav" preload="auto"></audio>
		<audio id="A3" src="sounds/A3.wav" preload="auto"></audio>
		<audio id="B3" src="sounds/B3.wav" preload="auto"></audio>
		<audio id="C4" src="sounds/C4.wav" preload="auto"></audio>
	</a-assets>

	<a-scene>
		<!-- Environment -->
		<a-entity environment="preset: forest"></a-entity>
		<a-light color="white" position="0 5 0" intensity="3"></a-light>

		<!-- Camera with cursor -->
		<a-camera look-controls="pointerLockEnabled: true">
			<a-cursor></a-cursor>
		</a-camera>

		<!-- Music notes -->
		<a-box mixin="key depth" height="2" position="-0.9 1.1 -3" color="#FF0000"
			animation__leave="property: color; to: #FF0000" sound="src: #C3"
			animation__click="from: -0.9 1.05 -3; to: -0.9 1.1 -3">

			<a-text mixin="text-note" value="C"></a-text>

		</a-box>

		<a-box mixin="key depth" position="-0.6 1.1 -3" height="1.8" color="#FFA500"
			animation__leave="property: color; to: #FFA500" sound="src: #D3"
			animation__click="from: -0.6 1.05 -3; to: -0.6 1.1 -3">

			<a-text mixin="text-note" value="D"></a-text>

		</a-box>

		<a-box mixin="key depth" position="-0.3 1.1 -3" height="1.6" color="#FFFF00"
			animation__leave="property: color; to: #FFFF00" sound="src: #E3"
			animation__click="from: -0.3 1.05 -3; to: -0.3 1.1 -3">

			<a-text mixin="text-note" value="E"></a-text>

		</a-box>

		<a-box mixin="key depth" position="0 1.1 -3" height="1.4" color="#00FF00"
			animation__leave="property: color; to: #00FF00" sound="src: #F3"
			animation__click="from: 0 1.05 -3; to: 0 1.1 -3">

			<a-text mixin="text-note" value="F"></a-text>

		</a-box>

		<a-box mixin="key depth" position="0.3 1.1 -3" height="1.2" color="#00FFFF"
			animation__leave="property: color; to: #00FFFF" sound="src: #G3"
			animation__click="from: 0.3 1.05 -3; to: 0.3 1.1 -3">

			<a-text mixin="text-note" value="G"></a-text>

		</a-box>

		<a-box mixin="key depth" position="0.6 1.1 -3" height="1.0" color="#0000FF"
			animation__leave="property: color; to: #0000FF" sound="src: #A3"
			animation__click="from: 0.6 1.05 -3; to: 0.6 1.1 -3">

			<a-text mixin="text-note" value="A"></a-text>

		</a-box>

		<a-box mixin="key depth" position="0.9 1.1 -3" height="0.8" color="#8B00FF"
			animation__leave="property: color; to: #8B00FF" sound="src: #B3"
			animation__click="from: 0.9 1.05 -3; to: 0.9 1.1 -3">

			<a-text mixin="text-note" value="B"></a-text>

		</a-box>

		<a-box mixin="key depth" position="1.2 1.1 -3" height="0.6" color="#FF0000"
			animation__leave="property: color; to: #FF0000" sound="src: #C4"
			animation__click="from: 1.2 1.05 -3; to: 1.2 1.1 -3">

			<a-text mixin="text-note" value="C"></a-text>

		</a-box>
	</a-scene>
</body>

</html>
